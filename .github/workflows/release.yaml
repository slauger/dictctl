name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  go:
    uses: ./.github/workflows/go.yaml

  release:
    needs: go
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-s -w -X main.version=${VERSION}"

          GOOS=linux   GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/dictctl-linux-amd64 ./cmd/dictctl
          GOOS=linux   GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/dictctl-linux-arm64 ./cmd/dictctl
          GOOS=darwin  GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/dictctl-darwin-arm64 ./cmd/dictctl

          cd dist
          sha256sum dictctl-* > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/dictctl-linux-amd64
            dist/dictctl-linux-arm64
            dist/dictctl-darwin-arm64
            dist/checksums.txt
